function route() {
  const hash = location.hash.replace('#','');
  if (!hash || hash === 'home') return home();
  const pred = predictionsIndex.find(p => p.id.endsWith(hash) || p.id === hash);
  if (pred) return loadPrediction(pred.id);
  home();
}

async function loadPrediction(id) {
  $('#app').innerHTML = `<div id="loading"><div class="spinner"></div></div>`;
  window.scrollTo(0,0);
  try {
    const res = await fetch(`data/${id}.json`);
    if (!res.ok) throw new Error('Not found');
    const d = await res.json();
    renderPrediction(d);
  } catch(e) {
    $('#app').innerHTML = `<div class="max-w-3xl mx-auto px-4 py-20 text-center font-sans"><p class="text-olive-gray">数据加载失败</p><a href="#home" class="text-terracotta hover:text-coral mt-4 inline-block transition-warm">← 返回首页</a></div>`;
  }
}

  ${hasTimeline ? `<div class="bg-[#3898ec]/[0.04] border border-[#3898ec]/15 rounded-xl p-6 mb-8"><h3 class="text-[15px] font-serif font-normal text-[#3898ec] mb-4">明日竞价统一观察框架（9:15-9:25）</h3><div class="timeline relative pl-6 my-4">${d.auctionTimeline.map(t=>`<div class="timeline-dot relative mb-4 pl-5"><div class="text-[11px] text-stone-gray font-mono font-semibold">${t.time}</div><div class="text-[13px] text-olive-gray leading-relaxed mt-0.5 font-sans">${t.desc}</div></div>`).join('')}</div></div>`:''}

  <!-- RISK -->
  ${d.riskItems && d.riskItems.length ? `<div class="bg-crimson/[0.04] border border-crimson/15 rounded-xl p-6 mb-8"><h3 class="text-[15px] font-serif font-normal text-crimson mb-5 flex items-center gap-1.5">风险提示与风控纪律</h3><ul class="list-none space-y-2 font-sans">${d.riskItems.map(r=>`<li class="text-[13px] text-olive-gray leading-relaxed pl-5 relative before:content-['!'] before:absolute before:left-0 before:text-warn-amber before:text-xs before:font-bold border-b border-crimson/5 pb-2">${r}</li>`).join('')}</ul></div>`:''}

  <!-- FOOTER -->
  ${d.footer ? `<div class="text-center pt-10 border-t border-border-cream text-xs text-stone-gray leading-relaxed font-sans"><p>数据来源：${d.footer.source} | 生成时间：${d.footer.time}</p><p class="text-crimson/70 mt-3">以上内容由AI基于公开信息整理生成，仅供参考，不构成任何投资建议。</p><p class="mt-2"><a href="https://github.com/zazzzf/AStockEveryDay" target="_blank" class="text-terracotta hover:text-coral transition-warm">View on GitHub</a></p></div>`:''}
</div>`;
}

function renderMarketSnapshot(d) {
  if (!d.marketSnapshot || !d.marketSnapshot.indices) return '';
  const idx = d.marketSnapshot.indices;
  return `<div class="bg-ivory border border-border-cream rounded-2xl p-6 sm:p-7 mb-8 whisper">
    <h2 class="text-[15px] font-serif font-normal text-terracotta mb-5 flex items-center gap-2">今日市场全景</h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${idx.map(i=>`
      <div class="bg-parchment border border-border-cream rounded-xl p-3.5 text-center hover:border-terracotta/20 transition-warm">
        <div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">${i.label}</div>
        <div class="text-lg font-sans font-bold ${i.isUp?'text-rise-red':'text-fall-green'} tabular-nums mt-1">${i.value}</div>
        ${i.change?`<div class="text-xs ${i.isUp?'text-rise-red':'text-stone-gray'} font-sans mt-0.5">${i.change}</div>`:''}
      </div>`).join('')}</div></div>`;
}

function renderStockCard(s) {
  const metrics = s.metrics || [];
  const tags = s.tags || [];
  return `<div class="bg-ivory border border-border-cream rounded-2xl p-5 sm:p-6 mb-5 whisper hover:border-terracotta/20 transition-warm">
    <div class="flex items-center gap-3 mb-5 flex-wrap">
      <span class="inline-flex items-center justify-center w-8 h-8 rounded-xl ${rankBadge(s.rank)} font-bold text-sm font-sans">${s.rank}</span>
      <span class="text-xl font-serif font-normal text-near-black"><a href="${baiduUrl(s.code)}" target="_blank" class="hover:text-terracotta transition-warm" title="百度行情">${s.name}</a></span>
      <span class="text-sm text-stone-gray font-mono">${s.code}</span>
      ${tags.map(t=>`<span class="inline-flex items-center gap-1 text-[11px] font-sans font-medium px-2.5 py-1 rounded-full border ${tagClr(t.type)}">${t.text}</span>`).join('')}
    </div>
    <div class="flex items-center gap-3 mb-5">
      <span class="text-[11px] text-stone-gray whitespace-nowrap font-sans">涨停概率评分</span>
      <div class="flex-1 h-1.5 bg-warm-sand rounded-full overflow-hidden"><div class="score-fill" style="width:${s.score}%;background:${scoreGrad(s.score)}"></div></div>
      <span class="text-sm font-bold text-terracotta min-w-[28px] text-right font-sans">${s.score}</span>
    </div>
    <div class="flex items-baseline gap-4 mb-5 flex-wrap">
      <span class="text-2xl sm:text-[28px] font-bold text-rise-red tabular-nums font-sans">${s.price}</span>
      <span class="text-base font-semibold text-rise-red font-sans">${s.change}</span>
      ${s.limitStatus?`<span class="text-xs text-stone-gray bg-parchment px-3 py-1 rounded-full border border-border-cream font-sans">${s.limitStatus}</span>`:''}
    </div>
    ${metrics.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">${metrics.map(m=>`<div class="bg-parchment border border-border-cream rounded-xl p-3"><div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">${m.label}</div><div class="text-[15px] font-sans font-semibold ${m.highlight?'text-rise-red':'text-near-black'} mt-0.5">${m.value}</div></div>`).join('')}</div>`:''}
    <div class="space-y-3">
      ${s.coreLogic?`<div class="bg-[#3898ec]/[0.03] border-l-[3px] border-[#3898ec] border border-[#3898ec]/15 rounded-xl p-4"><h4 class="text-sm font-serif font-normal text-[#3898ec] mb-2">核心逻辑</h4><p class="text-sm text-olive-gray leading-relaxed font-sans">${s.coreLogic}</p></div>`:''}
      ${s.auctionExpect?`<div class="bg-terracotta/[0.04] border border-terracotta/20 rounded-xl p-5"><h4 class="text-sm font-serif font-normal text-terracotta mb-3 flex items-center gap-1.5">明日竞价预期</h4><p class="text-sm text-olive-gray leading-relaxed font-sans">${s.auctionExpect}</p></div>`:''}
      ${s.entryCondition?`<div class="bg-[#5a9e6b]/[0.04] border border-[#5a9e6b]/20 rounded-xl p-5"><h4 class="text-sm font-serif font-normal text-fall-green mb-3 flex items-center gap-1.5">建议上车条件</h4><p class="text-sm text-olive-gray leading-relaxed font-sans">${s.entryCondition}</p></div>`:''}
    </div>
  </div>`;
}

// ==================== INIT ====================

// ==================== BACKTEST RENDER ====================
function renderBacktestSummary() {
  if (!backtestData || !backtestData.summary) return '';
  const s = backtestData.summary;
  const color = s.avg_return >= 0 ? 'text-rise-red' : 'text-fall-green';
  return `<div class="bg-ivory border border-border-cream rounded-2xl p-6 sm:p-7 mb-8 whisper">
    <h3 class="text-lg font-serif font-normal text-near-black mb-4">回测总览</h3>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div class="bg-parchment border border-border-cream rounded-xl p-3.5 text-center">
        <div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">总预测数</div>
        <div class="text-2xl font-sans font-bold text-near-black mt-1">${s.total}</div>
      </div>
      <div class="bg-parchment border border-border-cream rounded-xl p-3.5 text-center">
        <div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">平均收益</div>
        <div class="text-2xl font-sans font-bold ${color} mt-1">${s.avg_return >= 0 ? '+' : ''}${s.avg_return.toFixed(2)}%</div>
      </div>
      <div class="bg-parchment border border-border-cream rounded-xl p-3.5 text-center">
        <div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">胜率</div>
        <div class="text-2xl font-sans font-bold text-near-black mt-1">${s.win_rate.toFixed(1)}%</div>
      </div>
      <div class="bg-parchment border border-border-cream rounded-xl p-3.5 text-center">
        <div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">盈利/总</div>
        <div class="text-2xl font-sans font-bold text-rise-red mt-1">${s.win}/${s.total}</div>
      </div>
    </div>
    <p class="text-xs text-stone-gray mt-3 font-sans leading-relaxed">
      回测规则：近10个交易日的预测从入选次日开盘追踪至今日收盘；10个交易日之前的预测只追踪10个交易日（从入选日开盘起）。入场价为预测日期开盘价，出场价为截止日收盘价。数据来源：腾讯自选股前复权K线。
    </p>
  </div>`;
}

function renderBacktestByDate() {
  if (!backtestData || !backtestData.by_date) return '';
  const dates = backtestData.by_date;
  // Sort newest first
  const sorted = [...dates].reverse();
  return `<div class="bg-ivory border border-border-cream rounded-2xl p-6 sm:p-7 mb-8 whisper">
    <h3 class="text-lg font-serif font-normal text-near-black mb-4">按预测日期汇总</h3>
    <div class="overflow-x-auto">
      <table class="w-full border-collapse text-[13px] font-sans">
        <thead>
          <tr>
            <th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-left font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">预测日期</th>
            <th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-center font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">股数</th>
            <th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-center font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">持仓天数</th>
            <th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-center font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">平均收益</th>
            <th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-center font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">胜率</th>
            <th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-center font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">归属</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(d => {
            const clr = d.avg_return >= 0 ? 'text-rise-red' : 'text-fall-green';
            const bucket = d.is_recent ? '近10日→今' : '>10日→+10d';
            const bucketCls = d.is_recent ? 'text-focus-blue' : 'text-stone-gray';
            return `<tr class="even:bg-parchment hover:bg-terracotta/[0.02]">
              <td class="px-3 py-2 border border-border-cream text-near-black font-medium whitespace-nowrap">${d.date}</td>
              <td class="px-3 py-2 border border-border-cream text-center text-olive-gray">${d.count}</td>
              <td class="px-3 py-2 border border-border-cream text-center text-olive-gray">${d.days_held}</td>
              <td class="px-3 py-2 border border-border-cream text-center font-semibold ${clr}">${d.avg_return >= 0 ? '+' : ''}${d.avg_return.toFixed(2)}%</td>
              <td class="px-3 py-2 border border-border-cream text-center">${d.win_rate.toFixed(0)}%</td>
              <td class="px-3 py-2 border border-border-cream text-center text-xs ${bucketCls}">${bucket}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderBacktestDetail() {
  if (!backtestData || !backtestData.results) return '';
  const all = backtestData.results;
  // Group by date
  const groups = {};
  all.forEach(r => {
    if (!groups[r.pred_date]) groups[r.pred_date] = [];
    groups[r.pred_date].push(r);
  });
  // Sort dates newest first
  const dates = Object.keys(groups).sort().reverse();
  const totalDays = dates.length;
  const totalStocks = all.length;
  const totalAvg = all.reduce((s,r) => s + r.return_pct, 0) / all.length;
  const totalWin = all.filter(r => r.return_pct > 0).length;

  return `<div class="bg-ivory border border-border-cream rounded-2xl p-6 sm:p-7 mb-8 whisper">
    <h3 class="text-lg font-serif font-normal text-near-black mb-1">个股回测明细</h3>
    <p class="text-xs text-stone-gray mb-6 font-sans">共 ${totalDays} 个交易日 · ${totalStocks} 只个股 · 总均收益 <span class="${totalAvg>=0?'text-rise-red':'text-fall-green'} font-semibold">${totalAvg>=0?'+':''}${totalAvg.toFixed(2)}%</span> · 胜率 ${(totalWin/totalStocks*100).toFixed(0)}%</p>
    ${dates.map(d => {
      const stocks = groups[d].sort((a,b) => a.rank - b.rank);
      const avg = stocks.reduce((s,r) => s + r.return_pct, 0) / stocks.length;
      const win = stocks.filter(r => r.return_pct > 0).length;
      const isRecent = stocks[0].is_recent;
      const daysHeld = stocks[0].days_held;
      const exitDate = stocks[0].exit_date;
      const bucketLabel = isRecent ? `持仓${daysHeld}天→${exitDate.slice(5)}` : `持仓${daysHeld}天(限10d)`;
      const dateColor = d === '2026-06-30' ? 'text-terracotta' : 'text-near-black';

      return `<div class="mb-6 last:mb-0">
        <div class="flex items-center gap-3 mb-3 pb-2 border-b border-border-cream">
          <span class="text-sm font-serif font-medium ${dateColor}">${d}</span>
          <span class="text-[11px] text-stone-gray font-sans bg-warm-sand/50 border border-border-cream rounded-full px-2 py-0.5">${bucketLabel}</span>
          <span class="text-xs font-sans font-semibold ${avg>=0?'text-rise-red':'text-fall-green'} ml-auto">${avg>=0?'+':''}${avg.toFixed(2)}%</span>
          <span class="text-[11px] text-olive-gray font-sans">${win}/${stocks.length}胜</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full border-collapse text-[12px] font-sans">
            <thead>
              <tr>
                <th class="bg-warm-sand/30 text-stone-gray px-2 py-1.5 text-center font-semibold text-[10px] tracking-wider border border-border-cream whitespace-nowrap">排名</th>
                <th class="bg-warm-sand/30 text-stone-gray px-2 py-1.5 text-left font-semibold text-[10px] tracking-wider border border-border-cream whitespace-nowrap">代码</th>
                <th class="bg-warm-sand/30 text-stone-gray px-2 py-1.5 text-left font-semibold text-[10px] tracking-wider border border-border-cream whitespace-nowrap">名称</th>
                <th class="bg-warm-sand/30 text-stone-gray px-2 py-1.5 text-right font-semibold text-[10px] tracking-wider border border-border-cream whitespace-nowrap">入场价</th>
                <th class="bg-warm-sand/30 text-stone-gray px-2 py-1.5 text-right font-semibold text-[10px] tracking-wider border border-border-cream whitespace-nowrap">出场价</th>
                <th class="bg-warm-sand/30 text-stone-gray px-2 py-1.5 text-right font-semibold text-[10px] tracking-wider border border-border-cream whitespace-nowrap">收益</th>
              </tr>
            </thead>
            <tbody>
              ${stocks.map(r => {
                const clr = r.return_pct >= 0 ? 'text-rise-red' : 'text-fall-green';
                const bg = r.return_pct >= 10 ? 'bg-rise-red/[0.03]' : r.return_pct <= -5 ? 'bg-fall-green/[0.03]' : '';
                const rankClr = r.rank === 1 ? 'bg-terracotta/10 text-terracotta font-bold' : 'text-olive-gray';
                return `<tr class="${bg} hover:bg-terracotta/[0.02]">
                  <td class="px-2 py-1.5 border border-border-cream text-center text-[11px] ${rankClr}">${r.rank}</td>
                  <td class="px-2 py-1.5 border border-border-cream text-olive-gray font-mono text-[11px]">${r.code}</td>
                  <td class="px-2 py-1.5 border border-border-cream text-near-black">${r.name}</td>
                  <td class="px-2 py-1.5 border border-border-cream text-right tabular-nums">${r.entry_open.toFixed(2)}</td>
                  <td class="px-2 py-1.5 border border-border-cream text-right tabular-nums">${r.exit_close.toFixed(2)}</td>
                  <td class="px-2 py-1.5 border border-border-cream text-right font-semibold ${clr} tabular-nums">${r.return_pct >= 0 ? '+' : ''}${r.return_pct.toFixed(2)}%</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }).join('')}
    <p class="text-xs text-stone-gray mt-4 pt-4 border-t border-border-cream font-sans">入场价 = 预测日期开盘价（前复权）；出场价 = 截止日收盘价（前复权）。数据来源：腾讯自选股。</p>
  </div>`;
}

async function init() {
  try {
    const res = await fetch('data/predictions.json');
    predictionsIndex = await res.json();
  } catch(e) {
    predictionsIndex = [];
  }
  route();
  window.addEventListener('hashchange', route);
}
init();
</script>
</body>
</html>
