<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股每日涨停预测 · Stock Partner</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    parchment:'#f5f4ed', ivory:'#faf9f5', 'near-black':'#141413',
    terracotta:'#c96442', coral:'#d97757',
    'warm-sand':'#e8e6dc', 'charcoal-warm':'#4d4c48',
    'olive-gray':'#5e5d59', 'stone-gray':'#87867f',
    'border-cream':'#f0eee6', 'border-warm':'#e8e6dc',
    'dark-surface':'#30302e', 'warm-silver':'#b0aea5',
    'crimson':'#b53333', 'focus-blue':'#3898ec',
    'rise-red':'#d94a3a', 'fall-green':'#5a9e6b', 'warn-amber':'#b8860b'
  }}}
}
</script>
<style>
  :root {
    --serif: Georgia, 'Noto Serif SC', 'Source Han Serif SC', serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  .font-serif { font-family: var(--serif); }
  .font-sans { font-family: var(--sans); }

  /* Score progress bar */
  .score-fill { height: 100%; border-radius: 3px; }

  /* Timeline styling */
  .timeline { position: relative; }
  .timeline::before { content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1.5px; background: #e8e6dc; }
  .timeline-dot { position: relative; }
  .timeline-dot::before { content: ''; position: absolute; left: -19px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: #c96442; border: 2px solid #f5f4ed; box-shadow: 0px 0px 0px 1px #c96442; }

  /* Latest ribbon - subtle Claude-style */
  .latest-ribbon { position: absolute; top: 16px; right: -28px; background: #c96442; color: #faf9f5; font-size: 9px; font-weight: 600; letter-spacing: 1.5px; padding: 4px 36px; transform: rotate(35deg); pointer-events: none; font-family: var(--sans); text-transform: uppercase; }

  /* Loading */
  #loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
  .spinner { width: 36px; height: 36px; border: 2px solid #e8e6dc; border-top-color: #c96442; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Ring shadow utilities */
  .ring-warm { box-shadow: 0px 0px 0px 1px #d1cfc5; }
  .ring-terracotta { box-shadow: 0px 0px 0px 1px #c96442; }
  .whisper { box-shadow: rgba(0,0,0,0.05) 0px 4px 24px; }

  /* Smooth transitions */
  .transition-warm { transition: all 0.2s ease; }

  /* Section divider */
  .section-divider { display: flex; align-items: center; gap: 12px; }
  .section-divider span { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #87867f; white-space: nowrap; font-family: var(--sans); }
  .section-divider .line { flex: 1; height: 1px; background: #e8e6dc; }
</style>
</head>
<body class="bg-parchment text-near-black font-sans antialiased min-h-screen leading-relaxed">

<div id="app"><!-- SPA renders here --></div>

<script>
// ==================== APP STATE & ROUTER ====================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let predictionsIndex = [];

function route() {
  const hash = location.hash.replace('#','');
  if (!hash || hash === 'home') return home();
  const pred = predictionsIndex.find(p => p.id.endsWith(hash) || p.id === hash);
  if (pred) return loadPrediction(pred.id);
  home();
}

// ==================== HELPERS ====================
const scoreGrad = s => s >= 95 ? 'linear-gradient(90deg,#5a9e6b,#c96442)' : s >= 88 ? 'linear-gradient(90deg,#b8860b,#c96442)' : 'linear-gradient(90deg,#b8860b,#3898ec)';
const rankBadge = r => {
  if (r===1) return 'bg-terracotta text-ivory shadow-[0px_0px_0px_1px_#c96442]';
  if (r===2) return 'bg-[#b0aea5] text-near-black';
  if (r===3) return 'bg-[#b8860b] text-ivory';
  return 'bg-[#e8e6dc] text-stone-gray';
};
const tagClr = t => {
  if (t==='concept') return 'bg-[#3898ec]/8 text-[#3898ec] border-[#3898ec]/15';
  if (t==='lhb') return 'bg-[#c96442]/8 text-[#c96442] border-[#c96442]/15';
  return 'bg-[#5a9e6b]/8 text-[#5a9e6b] border-[#5a9e6b]/15';
};

// ==================== HOME PAGE ====================
function home() {
  const latest = predictionsIndex[0];
  const history = predictionsIndex.slice(1);
  $('#app').innerHTML = `
<!-- HERO -->
<div class="bg-warm-sand/30 py-14 sm:py-20 px-4 text-center border-b border-border-cream">
  <div class="max-w-2xl mx-auto">
    <div class="inline-flex items-center gap-2.5 text-xs text-stone-gray tracking-[2px] uppercase mb-8 font-sans select-none">
      <span class="w-[28px] h-[28px] bg-terracotta rounded-lg inline-flex items-center justify-center text-[14px] text-ivory font-bold font-serif">S</span> Stock Partner
    </div>
    <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-[56px] font-serif font-normal leading-[1.15] text-near-black mb-6 tracking-tight">A股每日涨停预测</h1>
    <p class="text-base sm:text-lg text-olive-gray max-w-lg mx-auto leading-relaxed font-sans">基于热门股、资金流向、龙虎榜、热门概念多维数据，每日筛选最具涨停潜力的5只个股</p>
    <div class="flex items-center justify-center gap-3 mt-8 flex-wrap">
      <span class="inline-flex items-center gap-1.5 text-xs text-terracotta bg-terracotta/10 border border-terracotta/20 rounded-full px-4 py-1.5 font-sans">每个交易日 20:00 自动更新</span>
    </div>
  </div>
</div>

<!-- LATEST PREDICTION -->
<div class="max-w-3xl mx-auto px-4 py-12 sm:py-16">
  <div class="section-divider mb-8"><span>最新一期</span><div class="line"></div></div>

  <div class="bg-ivory border border-border-cream rounded-2xl p-6 sm:p-8 relative overflow-hidden whisper">
    <div class="latest-ribbon">LATEST</div>
    <div class="mb-6">
      <div class="flex items-center gap-3 flex-wrap mb-4">
        <span class="inline-flex items-center gap-1 text-xs text-stone-gray bg-warm-sand/50 border border-border-cream rounded-full px-3 py-1 font-sans whitespace-nowrap">${latest.generated} 生成</span>
        <span class="text-border-warm text-base font-serif">→</span>
        <span class="text-xl sm:text-2xl font-serif font-normal text-near-black inline-flex items-center gap-2">${latest.date.slice(5)} <span class="text-xs font-sans font-medium text-[#3898ec] bg-[#3898ec]/8 border border-[#3898ec]/15 rounded-full px-2.5 py-1">${latest.weekday}</span></span>
      </div>
      <p class="text-sm text-olive-gray leading-relaxed pb-6 border-b border-border-cream font-sans">${latest.title} · ${latest.summary}</p>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2.5 mb-7">${latest.topStocks.map((n,i)=>`
      <a href="#${latest.id.slice(4)}" class="flex items-center gap-1.5 bg-parchment border border-border-cream rounded-xl px-3 py-2.5 text-sm hover:border-terracotta/30 hover:bg-terracotta/[0.03] transition-warm">
        <span class="inline-flex items-center justify-center w-5 h-5 rounded-lg ${i===0?'bg-terracotta text-ivory':i===1?'bg-stone-gray text-ivory':i===2?'bg-warn-amber text-ivory':'bg-warm-sand text-stone-gray'} text-[11px] font-bold font-sans">${i+1}</span>
        <span class="font-semibold text-near-black font-sans">${n}</span>
        <span class="text-[10px] text-stone-gray font-mono ml-auto">${latest.topCodes[i]}</span>
      </a>`).join('')}</div>

    <div class="flex gap-3 flex-wrap">
      <a href="#${latest.id.slice(4)}" class="inline-flex items-center justify-center gap-1.5 px-6 py-2.5 rounded-xl text-sm font-sans font-medium bg-terracotta text-ivory ring-terracotta hover:opacity-90 transition-warm">查看完整报告 →</a>
      <a href="https://github.com/zazzzf/AStockEveryDay" target="_blank" class="inline-flex items-center justify-center gap-1.5 px-6 py-2.5 rounded-xl text-sm font-sans font-medium bg-warm-sand text-charcoal-warm border border-border-warm hover:border-terracotta/30 transition-warm">GitHub 仓库</a>
    </div>
  </div>

  ${history.length ? `
  <div class="section-divider my-10"><span>往期记录</span><div class="line"></div></div>
  <div class="flex flex-col gap-3">
    ${history.map(h=>`
    <a href="#${h.id.slice(4)}" class="flex items-center gap-4 bg-ivory border border-border-cream rounded-xl px-5 py-3.5 transition-warm hover:border-terracotta/20 hover:bg-terracotta/[0.02] group">
      <span class="text-[11px] text-stone-gray bg-parchment border border-border-cream rounded-full px-2.5 py-1 font-sans whitespace-nowrap shrink-0">${h.generated} 生成</span>
      <span class="text-border-warm text-sm shrink-0 group-hover:text-terracotta transition-warm font-serif">→</span>
      <span class="flex-1 text-sm font-sans font-medium text-near-black min-w-0 overflow-hidden text-ellipsis whitespace-nowrap">${h.date.slice(5)} <span class="text-[#3898ec] font-normal text-xs ml-1">${h.weekday}</span> · ${h.title}</span>
      <span class="text-border-warm text-base shrink-0 group-hover:text-terracotta group-hover:translate-x-[3px] transition-warm font-serif">→</span>
    </a>`).join('')}
  </div>`:''}
</div>

<!-- FOOTER -->
<div class="text-center py-12 px-4 border-t border-border-cream text-xs text-stone-gray leading-relaxed font-sans">
  <p>数据来源：腾讯自选股 · 龙虎榜 · 通达信 &nbsp;|&nbsp; 每个交易日 20:00 自动生成</p>
  <p class="text-crimson/70 mt-3">以上内容由 AI 基于公开信息整理生成，仅供参考，不构成任何投资建议。</p>
  <p class="mt-3"><a href="https://github.com/zazzzf/AStockEveryDay" target="_blank" class="text-terracotta hover:text-coral transition-warm">查看 GitHub 仓库 →</a></p>
</div>`;
}

// ==================== PREDICTION PAGE ====================
async function loadPrediction(id) {
  $('#app').innerHTML = `<div id="loading"><div class="spinner"></div></div>`;
  window.scrollTo(0,0);
  try {
    const res = await fetch(`data/${id}.json`);
    if (!res.ok) throw new Error('Not found');
    const d = await res.json();
    renderPrediction(d);
  } catch(e) {
    $('#app').innerHTML = `<div class="max-w-3xl mx-auto px-4 py-20 text-center font-sans"><p class="text-olive-gray">数据加载失败</p><a href="#home" class="text-terracotta hover:text-coral mt-4 inline-block transition-warm">← 返回首页</a></div>`;
  }
}

function renderPrediction(d) {
  const stocks = d.stocks || [];
  const hasConcepts = d.hotConcepts && d.hotConcepts.length > 0;
  const hasFiveDay = d.fiveDayConcepts && d.fiveDayConcepts.length > 0;
  const hasTimeline = d.auctionTimeline && d.auctionTimeline.length > 0;
  const hasSummary = d.summaryTable && d.summaryTable.rows && d.summaryTable.rows.length > 0;

  $('#app').innerHTML = `
<div class="max-w-3xl mx-auto px-4 py-8 pb-20">
  <a href="#home" class="inline-flex items-center gap-1 text-sm text-stone-gray hover:text-terracotta mb-6 transition-warm font-sans">← 返回首页</a>

  <!-- HEADER -->
  <div class="text-center pb-10 mb-10 border-b border-border-cream">
    <h1 class="text-2xl sm:text-3xl md:text-4xl font-serif font-normal text-near-black mb-4 leading-tight tracking-tight">${d.title||'涨停预测'}</h1>
    <p class="text-sm text-olive-gray max-w-lg mx-auto mb-5 leading-relaxed font-sans">${d.subtitle||''}</p>
    <div class="flex justify-center gap-3 flex-wrap">
      <span class="inline-flex items-center gap-1 text-xs text-terracotta bg-terracotta/8 border border-terracotta/15 rounded-full px-3.5 py-1.5 font-sans">预测日期：${d.date}（${d.weekday}）| ${d.generated}生成</span>
    </div>
  </div>

  ${d.macroAlert ? `<div class="bg-crimson/[0.06] border border-crimson/15 rounded-xl p-5 mb-8 font-sans"><strong class="text-crimson">${d.macroAlert}</strong></div>`:''}

  <!-- MARKET SNAPSHOT -->
  ${renderMarketSnapshot(d)}

  ${d.themeOverview ? `<div class="bg-ivory border border-border-cream rounded-xl p-5 mb-8 text-sm text-olive-gray leading-relaxed font-sans">${d.themeOverview}</div>`:''}

  <!-- HOT CONCEPTS -->
  ${hasConcepts ? `<h2 class="text-lg font-serif font-normal text-near-black mb-5 flex items-center gap-2">热门概念</h2><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 mb-8">${d.hotConcepts.map(c=>`<div class="bg-ivory border border-border-cream rounded-xl p-3 text-sm font-sans"><span class="text-terracotta font-medium">#${c.rank}</span> ${c.name} <span class="${(c.change.startsWith('+')||c.change.includes('涨停'))?'text-rise-red':'text-fall-green'} float-right font-medium">${c.change}</span>${c.note?`<span class="text-xs text-stone-gray block mt-0.5">${c.note}</span>`:''}</div>`).join('')}</div>`:''}

  ${hasFiveDay ? `<h2 class="text-lg font-serif font-normal text-near-black mb-5 flex items-center gap-2">5日最强概念</h2><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-8">${d.fiveDayConcepts.map(c=>`<div class="bg-ivory border ${c.rank<=3?'border-terracotta/20':'border-border-cream'} rounded-xl p-3 text-sm font-sans">${c.medal?`<span class="${c.medal==='🥇'?'text-terracotta':c.medal==='🥈'?'text-stone-gray':'text-warn-amber'}">${c.medal}</span> `:`<span class="text-stone-gray">#${c.rank}</span> `}${c.name} <span class="text-rise-red float-right font-medium">${c.change}</span></div>`).join('')}</div>`:''}

  <!-- STOCK CARDS -->
  <h2 class="text-xl font-serif font-normal text-near-black mb-6 flex items-center gap-2">涨停预测 · 5强个股</h2>
  ${stocks.map(s=>renderStockCard(s)).join('')}

  <!-- SUMMARY TABLE -->
  ${hasSummary ? `<h2 class="text-xl font-serif font-normal text-near-black mb-5 mt-10 flex items-center gap-2">汇总对比</h2><div class="overflow-x-auto mb-8"><table class="w-full border-collapse text-[13px] font-sans"><thead><tr>${d.summaryTable.headers.map(h=>`<th class="bg-warm-sand/50 text-terracotta px-3 py-2.5 text-left font-semibold text-xs tracking-wider border border-border-cream whitespace-nowrap">${h}</th>`).join('')}</tr></thead><tbody>${d.summaryTable.rows.map((r,i)=>`<tr class="even:bg-ivory hover:bg-terracotta/[0.02]">${r.map(c=>`<td class="px-3 py-2.5 border border-border-cream text-olive-gray text-center">${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`:''}

  <!-- AUCTION TIMELINE -->
  ${hasTimeline ? `<div class="bg-[#3898ec]/[0.04] border border-[#3898ec]/15 rounded-xl p-6 mb-8"><h3 class="text-[15px] font-serif font-normal text-[#3898ec] mb-4">明日竞价统一观察框架（9:15-9:25）</h3><div class="timeline relative pl-6 my-4">${d.auctionTimeline.map(t=>`<div class="timeline-dot relative mb-4 pl-5"><div class="text-[11px] text-stone-gray font-mono font-semibold">${t.time}</div><div class="text-[13px] text-olive-gray leading-relaxed mt-0.5 font-sans">${t.desc}</div></div>`).join('')}</div></div>`:''}

  <!-- RISK -->
  ${d.riskItems && d.riskItems.length ? `<div class="bg-crimson/[0.04] border border-crimson/15 rounded-xl p-6 mb-8"><h3 class="text-[15px] font-serif font-normal text-crimson mb-5 flex items-center gap-1.5">风险提示与风控纪律</h3><ul class="list-none space-y-2 font-sans">${d.riskItems.map(r=>`<li class="text-[13px] text-olive-gray leading-relaxed pl-5 relative before:content-['!'] before:absolute before:left-0 before:text-warn-amber before:text-xs before:font-bold border-b border-crimson/5 pb-2">${r}</li>`).join('')}</ul></div>`:''}

  <!-- FOOTER -->
  ${d.footer ? `<div class="text-center pt-10 border-t border-border-cream text-xs text-stone-gray leading-relaxed font-sans"><p>数据来源：${d.footer.source} | 生成时间：${d.footer.time}</p><p class="text-crimson/70 mt-3">以上内容由AI基于公开信息整理生成，仅供参考，不构成任何投资建议。</p><p class="mt-2"><a href="https://github.com/zazzzf/AStockEveryDay" target="_blank" class="text-terracotta hover:text-coral transition-warm">View on GitHub</a></p></div>`:''}
</div>`;
}

function renderMarketSnapshot(d) {
  if (!d.marketSnapshot || !d.marketSnapshot.indices) return '';
  const idx = d.marketSnapshot.indices;
  return `<div class="bg-ivory border border-border-cream rounded-2xl p-6 sm:p-7 mb-8 whisper">
    <h2 class="text-[15px] font-serif font-normal text-terracotta mb-5 flex items-center gap-2">今日市场全景</h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${idx.map(i=>`
      <div class="bg-parchment border border-border-cream rounded-xl p-3.5 text-center hover:border-terracotta/20 transition-warm">
        <div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">${i.label}</div>
        <div class="text-lg font-sans font-bold ${i.isUp?'text-rise-red':'text-fall-green'} tabular-nums mt-1">${i.value}</div>
        ${i.change?`<div class="text-xs ${i.isUp?'text-rise-red':'text-stone-gray'} font-sans mt-0.5">${i.change}</div>`:''}
      </div>`).join('')}</div></div>`;
}

function renderStockCard(s) {
  const metrics = s.metrics || [];
  const tags = s.tags || [];
  return `<div class="bg-ivory border border-border-cream rounded-2xl p-5 sm:p-6 mb-5 whisper hover:border-terracotta/20 transition-warm">
    <div class="flex items-center gap-3 mb-5 flex-wrap">
      <span class="inline-flex items-center justify-center w-8 h-8 rounded-xl ${rankBadge(s.rank)} font-bold text-sm font-sans">${s.rank}</span>
      <span class="text-xl font-serif font-normal text-near-black">${s.name}</span>
      <span class="text-sm text-stone-gray font-mono">${s.code}</span>
      ${tags.map(t=>`<span class="inline-flex items-center gap-1 text-[11px] font-sans font-medium px-2.5 py-1 rounded-full border ${tagClr(t.type)}">${t.text}</span>`).join('')}
    </div>
    <div class="flex items-center gap-3 mb-5">
      <span class="text-[11px] text-stone-gray whitespace-nowrap font-sans">涨停概率评分</span>
      <div class="flex-1 h-1.5 bg-warm-sand rounded-full overflow-hidden"><div class="score-fill" style="width:${s.score}%;background:${scoreGrad(s.score)}"></div></div>
      <span class="text-sm font-bold text-terracotta min-w-[28px] text-right font-sans">${s.score}</span>
    </div>
    <div class="flex items-baseline gap-4 mb-5 flex-wrap">
      <span class="text-2xl sm:text-[28px] font-bold text-rise-red tabular-nums font-sans">${s.price}</span>
      <span class="text-base font-semibold text-rise-red font-sans">${s.change}</span>
      ${s.limitStatus?`<span class="text-xs text-stone-gray bg-parchment px-3 py-1 rounded-full border border-border-cream font-sans">${s.limitStatus}</span>`:''}
    </div>
    ${metrics.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">${metrics.map(m=>`<div class="bg-parchment border border-border-cream rounded-xl p-3"><div class="text-[11px] text-stone-gray uppercase tracking-wide font-sans">${m.label}</div><div class="text-[15px] font-sans font-semibold ${m.highlight?'text-rise-red':'text-near-black'} mt-0.5">${m.value}</div></div>`).join('')}</div>`:''}
    <div class="space-y-3">
      ${s.coreLogic?`<div class="bg-[#3898ec]/[0.03] border-l-[3px] border-[#3898ec] border border-[#3898ec]/15 rounded-xl p-4"><h4 class="text-sm font-serif font-normal text-[#3898ec] mb-2">核心逻辑</h4><p class="text-sm text-olive-gray leading-relaxed font-sans">${s.coreLogic}</p></div>`:''}
      ${s.auctionExpect?`<div class="bg-terracotta/[0.04] border border-terracotta/20 rounded-xl p-5"><h4 class="text-sm font-serif font-normal text-terracotta mb-3 flex items-center gap-1.5">明日竞价预期</h4><p class="text-sm text-olive-gray leading-relaxed font-sans">${s.auctionExpect}</p></div>`:''}
      ${s.entryCondition?`<div class="bg-[#5a9e6b]/[0.04] border border-[#5a9e6b]/20 rounded-xl p-5"><h4 class="text-sm font-serif font-normal text-fall-green mb-3 flex items-center gap-1.5">建议上车条件</h4><p class="text-sm text-olive-gray leading-relaxed font-sans">${s.entryCondition}</p></div>`:''}
    </div>
  </div>`;
}

// ==================== INIT ====================
async function init() {
  try {
    const res = await fetch('data/predictions.json');
    predictionsIndex = await res.json();
  } catch(e) {
    predictionsIndex = [];
  }
  route();
  window.addEventListener('hashchange', route);
}
init();
</script>
</body>
</html>
